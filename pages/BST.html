<!doctype html>
<html lang="cs">
    <head>
        <meta charset="UTF-8"/>
        <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
        <title>Binary Search Tree - Vizualizace struktur</title>
        <link rel="stylesheet" href="css/styles.css"/>
        <link rel="stylesheet" href="css/layout.css"/>
        <link rel="stylesheet" href="css/bst.css"/>
    </head>

    <body class="ll-page theme-green">
        <nav class="navbar navbar-compact">
            <div class="nav-left">
                <a class="brand" href="%BASE_URL%">VISUAL DS</a>
            </div>

            <div class="nav-center">
                <h1 class="navbar-title">Binary Search Tree - vizualizace</h1>
                <span id="stepInfo" class="nav-step muted"></span>
            </div>

            <div class="nav-right">
                <a class="btn ghost" href="%BASE_URL%">← Na hlavní</a>
            </div>
        </nav>

        <main class="container-wide ll-layout">
            <div class="ll-sidebar-col">
                <aside class="ll-sidebar">
                    <h2>Operace</h2>

                    <div class="group">
                        <label class="lbl" for="valInput">Hodnota</label>
                        <input id="valInput" type="number" value="10" class="inp"/>
                    </div>

                    <div class="group">
                        <button id="btnInsertHead" class="btn primary full">Vložit hodnotu</button>
                        <button id="btnDeleteRoot" class="btn full">Odstranit kořen</button>
                    </div>

                    <div class="group">
                        <button id="btnTraverseLifo" class="btn full">Průchod do hloubky (LIFO)</button>
                        <button id="btnTraverseFifo" class="btn full">Průchod do šířky (FIFO)</button>
                    </div>

                    <div class="group">
                        <button id="btnDeleteValue" class="btn full">Odstranit hodnotu</button>
                        <button id="btnFindValue" class="btn full">Najít hodnotu</button>
                    </div>

                    <div class="group">
                        <button id="btnRandom" class="btn full">Náhodný strom</button>
                        <button id="btnClear" class="btn full">Vyčistit strom</button>
                    </div>

                    <p class="hint">Tip: Enter - provést poslední operaci</p>
                </aside>

                <aside class="ll-note" aria-live="polite">
                    <div class="ll-note__title">Aktuální krok</div>
                    <div class="ll-note__text">
                        <span id="stepLabel" class="ll-traversal">Snapshot</span>
                    </div>
                </aside>

                <aside id="bstLimitBox" class="ll-note" aria-live="polite">
                    <div class="ll-note__title">Omezení vizualizace</div>
                    <div class="ll-note__text">
                        Maximální výška stromu jsou <strong>5 řádků</strong>.
                        Pokud by vložení vytvořilo <strong>6. řádek</strong>, operace se neprovede.
                    </div>
                </aside>

                <aside id="bstTraversalBox" class="ll-note" aria-live="polite">
                    <div class="ll-note__title">Pořadí průchodu</div>
                    <div class="ll-note__text">
                        <span id="bstTraversalText" class="ll-traversal">—</span>
                    </div>
                </aside>
            </div>

            <section class="ll-stage">
                <div class="stage-wrap">
                <svg id="stage" viewBox="0 0 1600 600" preserveAspectRatio="xMidYMid meet"></svg>

                <div class="player">
                    <button id="btnPrev" class="btn icon" title="Krok zpět">&#x23EE;</button>
                    <button id="btnPlay" class="btn icon" title="Přehrát">&#x25B6;</button>
                    <button id="btnPause" class="btn icon" title="Pauza">&#x23F8;</button>
                    <button id="btnNext" class="btn icon" title="Krok vpřed">&#x23ED;</button>

                    <div class="divider"></div>

                    <label class="speed">
                    <input id="speedRange" type="range" min="120" max="1500" step="60" value="600" />
                    </label>
                </div>
                </div>
            </section>
            </main>

        <script type="module" src="/src/DSstructures/bst.ts"></script>
    </body>
</html>
